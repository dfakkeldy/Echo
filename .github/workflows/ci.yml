name: CI

on:
  push:
    branches: [ main, weekly, nightly ]
  pull_request:
    branches: [ main, weekly, nightly ]

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build gate + tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin the toolchain to Xcode 26.x so CI compiles against the same SDK the
      # project is developed and shipped with. The macos-26 runner defaults to
      # Xcode 26.x today, and this explicit selection keeps future image updates
      # from silently jumping to a new major.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          # Namespaced by toolchain: DerivedData and module caches are not portable
          # across Xcode major versions, so a cache saved by an earlier 16.4 run
          # must not be restored into a 26.x build.
          key: ${{ runner.os }}-xcode26-spm-${{ hashFiles('**/Package.resolved', 'Echo.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode26-spm-

      - name: Diagnostics
        run: |
          xcodebuild -version
          echo "=== installed simulator runtimes ==="
          xcrun simctl list runtimes | grep -E "iOS|watchOS" || true
          echo "=== available devices ==="
          xcrun simctl list devices available | grep -E "iPhone|Watch" || true

      - name: Select iOS 26 test simulator
        id: ios-sim
        run: |
          set -euo pipefail
          IOS_SIM_SELECTION="$(
            xcrun simctl list devices available --json |
              jq -r '
                .devices
                | to_entries
                | map(
                    select(.key | test("SimRuntime\\.iOS-26-"))
                    | . + {
                        version: (
                          .key
                          | capture("iOS-(?<major>[0-9]+)-(?<minor>[0-9]+)")
                          | [.major, .minor]
                          | map(tonumber)
                        )
                      }
                  )
                | sort_by(.version[0], .version[1])
                | reverse
                | [
                    .[]
                    | .value
                    | map(
                        select(.isAvailable == true and (.name | test("^iPhone")))
                        | . + {
                            preference: (
                              if .name == "iPhone 17 Pro Max" then 0
                              elif .name == "iPhone 17 Pro" then 1
                              elif .name == "iPhone 17" then 2
                              elif .name == "iPhone Air" then 3
                              else 4
                              end
                            )
                          }
                      )
                    | sort_by(.preference)[]
                  ]
                | first
                | if . then [.udid, .name] | @tsv else empty end
              ' |
              head -n 1
          )"
          IOS_SIM_UDID="${IOS_SIM_SELECTION%%$'\t'*}"
          IOS_SIM_NAME="${IOS_SIM_SELECTION#*$'\t'}"

          if [ -z "$IOS_SIM_UDID" ] || [ "$IOS_SIM_UDID" = "$IOS_SIM_NAME" ]; then
            echo "::error title=iOS 26 iPhone simulator missing::The CI runner does not expose a compatible iOS 26 iPhone simulator."
            xcrun simctl list runtimes
            xcrun simctl list devices available
            exit 1
          fi

          echo "destination=platform=iOS Simulator,id=$IOS_SIM_UDID" >> "$GITHUB_OUTPUT"
          echo "Selected iOS test destination: platform=iOS Simulator,id=$IOS_SIM_UDID ($IOS_SIM_NAME)"

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Echo.xcodeproj \
            -scheme Echo \
            -onlyUsePackageVersionsFromResolvedFile

      # ── BUILD GATE ──────────────────────────────────────────────────────────
      # Compile every shipping target AND the test target. This is the gate for
      # non-compiling commits — e.g. the @frozen-on-an-internal-struct error and
      # the missing `import Foundation` in a test file, both of which merged
      # uncaught (CODE_AUDIT.md §10 rec. 5; §5.1). `build-for-testing` compiles
      # app + widget + embedded watch app + EchoTests without booting a simulator,
      # so it fails fast and clearly on compile errors.
      - name: Build for testing — Echo (iOS app + widget + watch + tests)
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Echo.xcodeproj \
            -scheme Echo \
            -destination "${{ steps.ios-sim.outputs.destination }}" \
            -parallel-testing-enabled NO \
            -jobs 5 \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Test — EchoTests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Echo.xcodeproj \
            -scheme Echo \
            -destination "${{ steps.ios-sim.outputs.destination }}" \
            -only-testing:EchoTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build — Echo macOS
        run: |
          set -o pipefail
          xcodebuild build \
            -project Echo.xcodeproj \
            -scheme "Echo macOS" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            -jobs 5 \
            -quiet

      - name: Build — echo-cli
        run: |
          set -o pipefail
          xcodebuild build \
            -project Echo.xcodeproj \
            -scheme echo-cli \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            -jobs 5 \
            -quiet
