			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# onnxruntime + onnxruntime_extensions are STATIC libs wrapped as .frameworks.\n# SPM embeds the wrappers into Frameworks/, which App Store validation rejects\n# (ITMS-90208 Invalid Bundle). The static code is already linked into the app\n# binary, so the embedded copies are redundant — remove them so upload validates.\n# Requires ENABLE_USER_SCRIPT_SANDBOXING=NO (set on this target).\nif [ -n \"${FRAMEWORKS_FOLDER_PATH}\" ]; then\n  DIR=\"${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\n  for fw in onnxruntime onnxruntime_extensions; do\n    if [ -d \"${DIR}/${fw}.framework\" ]; then\n      echo \"note: ITMS-90208 fix — removing statically-linked ${fw}.framework\"\n      rm -rf \"${DIR}/${fw}.framework\"\n    fi\n  done\nfi\n";
		};
